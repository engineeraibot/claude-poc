<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>AR Zombie Shooter</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Arial Black', Arial, sans-serif;
    }

    #video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    /* Three.js canvas inserted via JS after #video, z-index 2 */

    #hud {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10;
      pointer-events: none;
      user-select: none;
    }

    #crosshair {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 44px; height: 44px;
      filter: drop-shadow(0 0 3px rgba(0,0,0,0.8));
    }

    #score-display {
      position: absolute;
      top: 18px; left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 2px;
      text-shadow: 0 0 12px rgba(0,0,0,0.9), 2px 2px 4px rgba(0,0,0,1);
    }

    #wave-display {
      position: absolute;
      top: 52px; left: 50%;
      transform: translateX(-50%);
      color: #ff9900;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 1px;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.9);
      transition: font-size 0.3s ease, color 0.3s ease;
      white-space: nowrap;
    }

    #health-container {
      position: absolute;
      bottom: 170px; left: 20px;
      width: 140px;
    }
    #health-label {
      color: #fff;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 5px;
      text-shadow: 1px 1px 4px black;
      letter-spacing: 1px;
    }
    #health-bar-bg {
      width: 100%; height: 14px;
      background: rgba(0,0,0,0.6);
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: 7px;
      overflow: hidden;
    }
    #health-bar {
      width: 100%; height: 100%;
      background: linear-gradient(90deg, #2ecc71, #27ae60);
      border-radius: 5px;
      transition: width 0.25s, background 0.25s;
    }

    #ammo-display {
      position: absolute;
      bottom: 170px; right: 20px;
      text-align: right;
    }
    #ammo-count {
      color: #ffe066;
      font-size: 26px;
      font-weight: 900;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.95);
      transition: color 0.2s;
    }
    #ammo-label {
      color: #aaa;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    #kill-feed {
      position: absolute;
      top: 85px; right: 15px;
      max-width: 180px;
      text-align: right;
    }
    .kill-msg {
      display: block;
      color: #ff4444;
      font-size: 13px;
      font-weight: 900;
      text-shadow: 1px 1px 4px black;
      letter-spacing: 1px;
      animation: killFade 2s ease forwards;
    }
    @keyframes killFade {
      0%   { opacity: 1; transform: translateX(0); }
      70%  { opacity: 1; transform: translateX(0); }
      100% { opacity: 0; transform: translateX(20px); }
    }

    /* Buttons */
    #shoot-btn {
      position: absolute;
      bottom: 38px; right: 28px;
      width: 115px; height: 115px;
      border-radius: 58px;
      background: radial-gradient(circle at 40% 35%, #ff6b6b, #c0392b 80%);
      border: 4px solid rgba(255,255,255,0.85);
      color: #fff;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 2px;
      display: flex; align-items: center; justify-content: center;
      pointer-events: all;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 6px 20px rgba(231,76,60,0.7), inset 0 2px 5px rgba(255,255,255,0.25);
      transition: transform 0.06s, box-shadow 0.06s;
    }
    #shoot-btn:active {
      transform: scale(0.9);
      box-shadow: 0 2px 10px rgba(231,76,60,0.5);
    }

    #reload-btn {
      position: absolute;
      bottom: 55px; left: 28px;
      width: 82px; height: 82px;
      border-radius: 41px;
      background: radial-gradient(circle at 40% 35%, #5dade2, #2471a3 80%);
      border: 3px solid rgba(255,255,255,0.7);
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 1px;
      display: flex; align-items: center; justify-content: center;
      pointer-events: all;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 4px 14px rgba(52,152,219,0.6);
      transition: transform 0.1s;
    }
    #reload-btn:active { transform: scale(0.9); }

    /* Hit vignette */
    #hit-vignette {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(ellipse at center, transparent 35%, rgba(200,0,0,0.65) 100%);
      z-index: 9;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.08s;
    }

    /* Start overlay */
    #permission-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(160deg, #0d0d0d 0%, #1a0000 100%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px;
      text-align: center;
      color: white;
    }
    #permission-overlay h1 {
      font-size: 40px;
      font-weight: 900;
      color: #e74c3c;
      text-shadow: 0 0 30px rgba(231,76,60,0.6);
      line-height: 1.2;
      margin-bottom: 20px;
    }
    #permission-overlay p {
      font-size: 16px;
      color: #bbb;
      margin-bottom: 8px;
      max-width: 380px;
      line-height: 1.5;
    }
    #permission-overlay .tip {
      font-size: 13px;
      color: #666;
      margin-top: 6px;
    }
    #start-btn {
      margin-top: 32px;
      padding: 17px 55px;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 3px;
      background: linear-gradient(135deg, #e74c3c, #922b21);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 5px 25px rgba(231,76,60,0.55);
      transition: transform 0.1s;
    }
    #start-btn:active { transform: scale(0.95); }
    #start-btn:disabled { opacity: 0.6; cursor: default; }

    /* Game over */
    #game-over-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.88);
      z-index: 50;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
      padding: 30px;
    }
    #game-over-overlay h1 {
      font-size: 54px;
      font-weight: 900;
      color: #e74c3c;
      text-shadow: 0 0 35px rgba(231,76,60,0.7);
      animation: goPulse 1.2s ease-in-out infinite;
      margin-bottom: 25px;
    }
    @keyframes goPulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.06); }
    }
    .go-stat {
      font-size: 18px;
      color: #bbb;
      margin-bottom: 6px;
      font-weight: bold;
    }
    #restart-btn {
      margin-top: 30px;
      padding: 16px 50px;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 3px;
      background: linear-gradient(135deg, #e74c3c, #922b21);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 5px 25px rgba(231,76,60,0.55);
    }

    /* Reload progress ring */
    #reload-progress {
      position: absolute;
      bottom: 55px; left: 28px;
      width: 82px; height: 82px;
      pointer-events: none;
      z-index: 11;
      display: none;
    }
    #reload-progress circle {
      fill: none;
      stroke: #fff;
      stroke-width: 4;
      stroke-dasharray: 220;
      stroke-dashoffset: 220;
      stroke-linecap: round;
      transform-origin: center;
      transform: rotate(-90deg);
      transition: stroke-dashoffset linear;
    }
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>

<!-- Game over -->
<div id="game-over-overlay">
  <h1>GAME OVER</h1>
  <div class="go-stat" id="go-score">Score: 0</div>
  <div class="go-stat" id="go-kills">Zombies killed: 0</div>
  <div class="go-stat" id="go-wave">Wave reached: 1</div>
  <button id="restart-btn">PLAY AGAIN</button>
</div>

<!-- HUD -->
<div id="hud">
  <svg id="crosshair" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg" fill="none">
    <line x1="22" y1="4"  x2="22" y2="13" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="22" y1="31" x2="22" y2="40" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="4"  y1="22" x2="13" y2="22" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="31" y1="22" x2="40" y2="22" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="22" cy="22" r="3" fill="white"/>
  </svg>

  <div id="score-display">SCORE: 0</div>
  <div id="wave-display">WAVE 1</div>

  <div id="health-container">
    <div id="health-label">❤ HEALTH</div>
    <div id="health-bar-bg"><div id="health-bar"></div></div>
  </div>

  <div id="ammo-display">
    <div id="ammo-count">10 / 10</div>
    <div id="ammo-label">🔫 AMMO</div>
  </div>

  <div id="kill-feed"></div>

  <div id="shoot-btn">SHOOT</div>
  <div id="reload-btn">RELOAD</div>
</div>

<!-- Reload ring overlay (above HUD layer) -->
<svg id="reload-progress" viewBox="0 0 82 82" xmlns="http://www.w3.org/2000/svg">
  <circle id="reload-circle" cx="41" cy="41" r="35"/>
</svg>

<div id="hit-vignette"></div>

<!-- Start overlay -->
<div id="permission-overlay">
  <h1>🧟 AR ZOMBIE<br>SHOOTER</h1>
  <p>Zombies are invading your room!<br>Look around and shoot them all!</p>
  <p class="tip">📱 Point your camera &amp; tilt to look around</p>
  <p class="tip">💻 Desktop: drag to look · Space to shoot · R to reload</p>
  <button id="start-btn">▶ START GAME</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
'use strict';

// ─── GAME STATE ────────────────────────────────────────────────────────────────
const G = {
  score: 0,
  health: 100,
  ammo: 10,
  maxAmmo: 10,
  wave: 1,
  kills: 0,
  killsNextWave: 8,
  reloading: false,
  over: false,
  started: false,
  lastSpawn: 0,
  spawnMs: 3000,
  maxZombies: 6,
};

// ─── THREE.JS ─────────────────────────────────────────────────────────────────
let scene, camera, renderer, raycaster;
const zombies   = [];
const particles = [];
const clock     = new THREE.Clock();
let   muzzleLight;

function initScene() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.05, 300);
  camera.position.set(0, 1.6, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 0);
  renderer.domElement.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:2;';
  document.getElementById('video').after(renderer.domElement);

  raycaster = new THREE.Raycaster();

  scene.add(new THREE.AmbientLight(0xffffff, 0.55));

  const sun = new THREE.DirectionalLight(0xffd090, 1.1);
  sun.position.set(4, 10, 4);
  scene.add(sun);

  const fill = new THREE.DirectionalLight(0x90b0ff, 0.35);
  fill.position.set(-4, 4, -4);
  scene.add(fill);

  muzzleLight = new THREE.PointLight(0xff8800, 0, 10);
  muzzleLight.position.set(0, 1.6, 0);
  scene.add(muzzleLight);
}

// ─── ZOMBIE FACTORY ───────────────────────────────────────────────────────────
const PALETTE = [
  { body: 0x4a7a55, skin: 0x7aaf82 },
  { body: 0x5c4a3a, skin: 0x9a8070 },
  { body: 0x3a4a5c, skin: 0x7a9a80 },
  { body: 0x6a3535, skin: 0xaa8080 },
];

function mat(color) {
  return new THREE.MeshLambertMaterial({ color });
}

function createZombie() {
  const { body, skin } = PALETTE[Math.floor(Math.random() * PALETTE.length)];
  const g = new THREE.Group();

  // Torso
  const torso = new THREE.Mesh(new THREE.BoxGeometry(0.52, 0.65, 0.28), mat(body));
  torso.position.y = 0.93;
  g.add(torso);

  // Head
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.36), mat(skin));
  head.position.y = 1.44;
  g.add(head);

  // Eyes
  const eyeG = new THREE.BoxGeometry(0.11, 0.08, 0.02);
  const eyeM = new THREE.MeshBasicMaterial({ color: 0xff1100 });
  const lEye = new THREE.Mesh(eyeG, eyeM);
  lEye.position.set(-0.1, 1.46, 0.185); g.add(lEye);
  const rEye = new THREE.Mesh(eyeG, eyeM);
  rEye.position.set(0.1, 1.46, 0.185);  g.add(rEye);

  // Mouth (wound)
  const mouthM = new THREE.MeshBasicMaterial({ color: 0x660000 });
  const mouth = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.05, 0.02), mouthM);
  mouth.position.set(0, 1.31, 0.185); g.add(mouth);

  // Arms – extended forward (classic pose)
  const armG = new THREE.BoxGeometry(0.19, 0.55, 0.19);
  const lArm = new THREE.Mesh(armG, mat(body));
  lArm.position.set(-0.38, 1.02, 0.22);
  lArm.rotation.x = -Math.PI * 0.28;
  g.add(lArm);
  const rArm = new THREE.Mesh(armG, mat(body));
  rArm.position.set(0.38, 1.02, 0.22);
  rArm.rotation.x = -Math.PI * 0.28;
  g.add(rArm);

  // Legs
  const legG = new THREE.BoxGeometry(0.23, 0.65, 0.23);
  const lLeg = new THREE.Mesh(legG, mat(0x2c3e50));
  lLeg.position.set(-0.14, 0.33, 0); g.add(lLeg);
  const rLeg = new THREE.Mesh(legG, mat(0x2c3e50));
  rLeg.position.set(0.14, 0.33, 0);  g.add(rLeg);

  // Random spawn on circle perimeter
  const angle  = Math.random() * Math.PI * 2;
  const radius = 14 + Math.random() * 4;
  g.position.set(Math.sin(angle) * radius, 0, Math.cos(angle) * radius);

  // Parts for raycasting & hit-flash (exclude non-material meshes)
  const flashParts = [torso, head, lArm, rArm, lLeg, rLeg];
  const origColors = flashParts.map(m => m.material.color.getHex());

  g.userData = {
    alive: true,
    dying: false,
    dyingT: 0,
    hp: 3,
    speed: 0.45 + Math.random() * 0.3 + (G.wave - 1) * 0.12,
    walkT: Math.random() * Math.PI * 2,
    flashT: 0,
    flashParts,
    origColors,
    lLeg, rLeg, lArm, rArm,
  };

  scene.add(g);
  zombies.push(g);
}

// ─── BLOOD PARTICLES ──────────────────────────────────────────────────────────
function spawnBlood(pos) {
  const n = 7 + Math.floor(Math.random() * 7);
  for (let i = 0; i < n; i++) {
    const r = 0.03 + Math.random() * 0.04;
    const m = new THREE.Mesh(
      new THREE.SphereGeometry(r, 4, 4),
      new THREE.MeshBasicMaterial({ color: new THREE.Color(0.45 + Math.random() * 0.15, 0, 0) })
    );
    m.position.copy(pos);
    const vel = new THREE.Vector3(
      (Math.random() - 0.5) * 4,
      1 + Math.random() * 3,
      (Math.random() - 0.5) * 4
    );
    scene.add(m);
    particles.push({ m, vel, life: 0.5 + Math.random() * 0.5 });
  }
}

// ─── AUDIO (synthesised) ──────────────────────────────────────────────────────
let actx = null;

function initAudio() {
  actx = new (window.AudioContext || window.webkitAudioContext)();
}

function synth({ type = 'sine', freq0, freq1, dur, vol = 0.3, isNoise = false } = {}) {
  if (!actx) return;
  const t = actx.currentTime;
  const gain = actx.createGain();
  gain.gain.setValueAtTime(vol, t);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  gain.connect(actx.destination);

  if (isNoise) {
    const buf = actx.createBuffer(1, actx.sampleRate * dur, actx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (actx.sampleRate * 0.025));
    const src = actx.createBufferSource();
    src.buffer = buf;
    src.connect(gain);
    src.start(t);
  } else {
    const osc = actx.createOscillator();
    osc.type = type;
    osc.frequency.setValueAtTime(freq0, t);
    if (freq1) osc.frequency.exponentialRampToValueAtTime(freq1, t + dur);
    osc.connect(gain);
    osc.start(t);
    osc.stop(t + dur);
  }
}

const playShoot  = () => synth({ isNoise: true, dur: 0.18, vol: 0.5 });
const playHit    = () => synth({ type: 'sawtooth', freq0: 280, freq1: 70, dur: 0.12, vol: 0.18 });
const playDie    = () => synth({ type: 'sawtooth', freq0: 140, freq1: 28, dur: 0.45, vol: 0.22 });
const playEmpty  = () => synth({ type: 'square',   freq0: 380, freq1: 380, dur: 0.06, vol: 0.07 });
const playReload = () => synth({ type: 'sine',      freq0: 600, freq1: 900, dur: 0.15, vol: 0.12 });

// ─── DEVICE ORIENTATION ───────────────────────────────────────────────────────
const ori = { a: 0, b: 0, g: 0, has: false };
const _qA = new THREE.Quaternion();
const _qB = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5)); // -90° around X
const _zee = new THREE.Vector3(0, 0, 1);
const _eul = new THREE.Euler();

function onOri(e) {
  if (e.alpha === null) return;
  ori.a = e.alpha; ori.b = e.beta; ori.g = e.gamma; ori.has = true;
}

async function requestOri() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      if (await DeviceOrientationEvent.requestPermission() === 'granted')
        window.addEventListener('deviceorientation', onOri);
    } catch (_) {}
  } else {
    window.addEventListener('deviceorientation', onOri);
  }
}

function applyOri() {
  const screenAngle = (screen.orientation?.angle ?? window.orientation ?? 0);
  _eul.set(
    THREE.MathUtils.degToRad(ori.b),
     THREE.MathUtils.degToRad(ori.a),
    -THREE.MathUtils.degToRad(ori.g),
    'YXZ'
  );
  camera.quaternion.setFromEuler(_eul);
  camera.quaternion.multiply(_qB);
  camera.quaternion.multiply(_qA.setFromAxisAngle(_zee, -THREE.MathUtils.degToRad(screenAngle)));
}

// ─── MOUSE / TOUCH DRAG (desktop fallback) ────────────────────────────────────
const drag = { on: false, x: 0, y: 0, yaw: 0, pitch: 0, touchId: null };

function setupDrag() {
  const el = renderer.domElement;

  // Mouse
  el.addEventListener('mousedown', e => {
    if (ori.has) return;
    drag.on = true; drag.x = e.clientX; drag.y = e.clientY;
  });
  window.addEventListener('mouseup', () => { drag.on = false; });
  window.addEventListener('mousemove', e => {
    if (!drag.on || ori.has) return;
    drag.yaw   -= (e.clientX - drag.x) * 0.003;
    drag.pitch -= (e.clientY - drag.y) * 0.003;
    drag.pitch  = Math.max(-1.3, Math.min(1.3, drag.pitch));
    drag.x = e.clientX; drag.y = e.clientY;
  });

  // Touch on canvas (not on UI buttons)
  el.addEventListener('touchstart', e => {
    if (ori.has || drag.touchId !== null) return;
    const t = e.touches[0];
    drag.on = true; drag.touchId = t.identifier;
    drag.x = t.clientX; drag.y = t.clientY;
  }, { passive: true });

  el.addEventListener('touchmove', e => {
    if (!drag.on || ori.has) return;
    for (const t of e.touches) {
      if (t.identifier === drag.touchId) {
        drag.yaw   -= (t.clientX - drag.x) * 0.004;
        drag.pitch -= (t.clientY - drag.y) * 0.004;
        drag.pitch  = Math.max(-1.3, Math.min(1.3, drag.pitch));
        drag.x = t.clientX; drag.y = t.clientY;
        break;
      }
    }
  }, { passive: true });

  el.addEventListener('touchend', e => {
    for (const t of e.changedTouches) {
      if (t.identifier === drag.touchId) { drag.on = false; drag.touchId = null; }
    }
  });
}

function applyDrag() {
  if (ori.has) return;
  camera.quaternion.setFromEuler(new THREE.Euler(drag.pitch, drag.yaw, 0, 'YXZ'));
}

// ─── SHOOTING ─────────────────────────────────────────────────────────────────
let muzzleTO = null;

function shoot() {
  if (!G.started || G.over) return;
  if (G.reloading) {
    const btn = document.getElementById('reload-btn');
    btn.style.background = 'radial-gradient(circle,#e74c3c,#922b21)';
    setTimeout(() => btn.style.background = 'radial-gradient(circle at 40% 35%,#5dade2,#2471a3 80%)', 200);
    return;
  }
  if (G.ammo <= 0) { playEmpty(); flashAmmoRed(); return; }

  G.ammo--;
  updateAmmo();
  playShoot();

  // Muzzle flash
  muzzleLight.intensity = 6;
  clearTimeout(muzzleTO);
  muzzleTO = setTimeout(() => { muzzleLight.intensity = 0; }, 80);
  flashShootBtn();

  // Raycast from screen centre
  raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);

  const meshList = [];
  const meshMap  = new Map();
  for (const z of zombies) {
    if (!z.userData.alive || z.userData.dying) continue;
    for (const m of z.userData.flashParts) {
      meshList.push(m);
      meshMap.set(m, z);
    }
  }

  const hits = raycaster.intersectObjects(meshList);
  if (hits.length > 0) {
    const zombie = meshMap.get(hits[0].object);
    if (zombie) onHitZombie(zombie, hits[0].point);
  }

  // Auto-reload when empty
  if (G.ammo === 0) setTimeout(() => { if (!G.reloading) reload(); }, 350);
}

function onHitZombie(z, pt) {
  z.userData.hp--;
  z.userData.flashT = 0.14;
  playHit();
  spawnBlood(pt);
  if (z.userData.hp <= 0) killZombie(z);
}

function killZombie(z) {
  z.userData.alive = false;
  z.userData.dying = true;
  z.userData.dyingT = 0;
  playDie();
  G.score += 10 * G.wave;
  G.kills++;
  addKillMsg();
  updateScore();

  if (G.kills >= G.killsNextWave) {
    G.wave++;
    G.killsNextWave  += 8 + G.wave * 5;
    G.spawnMs         = Math.max(700, G.spawnMs - 200);
    G.maxZombies      = Math.min(22, G.maxZombies + 2);
    showWave();
  }
}

// ─── RELOAD ───────────────────────────────────────────────────────────────────
let reloadTO = null;

function reload() {
  if (G.reloading || G.ammo === G.maxAmmo || G.over) return;
  G.reloading = true;
  playReload();

  const btn  = document.getElementById('reload-btn');
  const ring = document.getElementById('reload-circle');
  const prog = document.getElementById('reload-progress');
  prog.style.display = 'block';

  const DURATION = 2000;
  const start = performance.now();

  function tick() {
    const elapsed = performance.now() - start;
    const p = Math.min(elapsed / DURATION, 1);
    // stroke-dashoffset from 220 → 0
    ring.style.strokeDashoffset = 220 * (1 - p);
    btn.textContent = Math.ceil((DURATION - elapsed) / 1000) + 's';

    if (p < 1) {
      reloadTO = setTimeout(tick, 16);
    } else {
      G.ammo = G.maxAmmo;
      G.reloading = false;
      btn.textContent = 'RELOAD';
      prog.style.display = 'none';
      ring.style.strokeDashoffset = 220;
      updateAmmo();
    }
  }

  ring.style.strokeDashoffset = 220;
  ring.style.transition = 'none';
  reloadTO = setTimeout(tick, 16);
}

// ─── DAMAGE ───────────────────────────────────────────────────────────────────
let vigTO = null;
let hitCD = 0;

function takeDamage(amt) {
  G.health = Math.max(0, G.health - amt);
  updateHealth();
  const v = document.getElementById('hit-vignette');
  v.style.opacity = '1';
  clearTimeout(vigTO);
  vigTO = setTimeout(() => { v.style.opacity = '0'; }, 320);
  if (G.health <= 0) gameOver();
}

// ─── UI ───────────────────────────────────────────────────────────────────────
function updateScore() {
  document.getElementById('score-display').textContent = `SCORE: ${G.score}`;
}

function updateHealth() {
  const pct = G.health;
  document.getElementById('health-bar').style.width = pct + '%';
  const bar = document.getElementById('health-bar');
  bar.style.background = pct > 60
    ? 'linear-gradient(90deg,#2ecc71,#27ae60)'
    : pct > 28
      ? 'linear-gradient(90deg,#f39c12,#d35400)'
      : 'linear-gradient(90deg,#e74c3c,#922b21)';
}

function updateAmmo() {
  const el = document.getElementById('ammo-count');
  el.textContent = `${G.ammo} / ${G.maxAmmo}`;
  el.style.color = G.ammo === 0 ? '#e74c3c' : G.ammo <= 3 ? '#f39c12' : '#ffe066';
}

function flashAmmoRed() {
  const el = document.getElementById('ammo-count');
  el.style.color = '#fff';
  setTimeout(() => { el.style.color = '#e74c3c'; }, 160);
}

let shootBtnTO = null;
function flashShootBtn() {
  const btn = document.getElementById('shoot-btn');
  btn.style.background = 'radial-gradient(circle at 40% 35%,#ffe066,#ff8800 80%)';
  clearTimeout(shootBtnTO);
  shootBtnTO = setTimeout(() => {
    btn.style.background = 'radial-gradient(circle at 40% 35%,#ff6b6b,#c0392b 80%)';
  }, 90);
}

let waveMsgTO = null;
function showWave() {
  const el = document.getElementById('wave-display');
  el.textContent = `⚠ WAVE ${G.wave}!`;
  el.style.fontSize = '32px';
  el.style.color = '#ff2200';
  clearTimeout(waveMsgTO);
  waveMsgTO = setTimeout(() => {
    el.textContent = `WAVE ${G.wave}`;
    el.style.fontSize = '15px';
    el.style.color = '#ff9900';
  }, 2500);
}

const KILL_MSGS = ['HEADSHOT!', 'ZOMBIE DOWN!', 'NICE SHOT!', 'ELIMINATED!', 'SPLAT!', 'BOOM!'];
function addKillMsg() {
  const feed = document.getElementById('kill-feed');
  const el = document.createElement('span');
  el.className = 'kill-msg';
  el.textContent = `+${10 * G.wave} ${KILL_MSGS[Math.floor(Math.random() * KILL_MSGS.length)]}`;
  feed.appendChild(el);
  setTimeout(() => el.remove(), 2000);
}

// ─── GAME OVER / RESTART ─────────────────────────────────────────────────────
function gameOver() {
  G.over = true;
  document.getElementById('go-score').textContent = `Score: ${G.score}`;
  document.getElementById('go-kills').textContent = `Zombies killed: ${G.kills}`;
  document.getElementById('go-wave').textContent  = `Wave reached: ${G.wave}`;
  document.getElementById('game-over-overlay').style.display = 'flex';
}

function restart() {
  Object.assign(G, {
    score: 0, health: 100, ammo: 10, maxAmmo: 10,
    wave: 1, kills: 0, killsNextWave: 8,
    reloading: false, over: false,
    lastSpawn: 0, spawnMs: 3000, maxZombies: 6,
  });

  clearTimeout(reloadTO);
  document.getElementById('reload-btn').textContent = 'RELOAD';
  document.getElementById('reload-progress').style.display = 'none';
  document.getElementById('reload-circle').style.strokeDashoffset = '220';
  document.getElementById('game-over-overlay').style.display = 'none';
  document.getElementById('hit-vignette').style.opacity = '0';
  document.getElementById('kill-feed').innerHTML = '';
  document.getElementById('wave-display').textContent = 'WAVE 1';
  document.getElementById('wave-display').style.fontSize = '15px';
  document.getElementById('wave-display').style.color = '#ff9900';

  for (const z of zombies) scene.remove(z);
  zombies.length = 0;
  for (const p of particles) { scene.remove(p.m); p.m.geometry.dispose(); p.m.material.dispose(); }
  particles.length = 0;

  hitCD = 0;
  updateScore(); updateHealth(); updateAmmo();
}

// ─── GAME LOOP ────────────────────────────────────────────────────────────────
const _tmpDir = new THREE.Vector3();

function loop() {
  requestAnimationFrame(loop);

  if (!G.started || G.over) { renderer.render(scene, camera); return; }

  const dt  = clock.getDelta();
  const now = performance.now();

  ori.has ? applyOri() : applyDrag();
  // camera.position stays at eye height (orientation only rotates)

  // Spawn
  if (now - G.lastSpawn > G.spawnMs) {
    const alive = zombies.filter(z => z.userData.alive).length;
    if (alive < G.maxZombies + G.wave * 2) createZombie();
    G.lastSpawn = now;
  }

  hitCD = Math.max(0, hitCD - dt);

  // Update zombies
  for (let i = zombies.length - 1; i >= 0; i--) {
    const z  = zombies[i];
    const ud = z.userData;

    if (ud.dying) {
      ud.dyingT += dt * 2.5;
      z.position.y -= dt * 1.8;
      z.scale.setScalar(Math.max(0.01, 1 - ud.dyingT * 0.8));
      if (ud.dyingT >= 1.3) {
        scene.remove(z);
        zombies.splice(i, 1);
      }
      continue;
    }
    if (!ud.alive) continue;

    // Walk toward player (XZ plane)
    _tmpDir.set(-z.position.x, 0, -z.position.z).normalize();
    z.position.x += _tmpDir.x * ud.speed * dt;
    z.position.z += _tmpDir.z * ud.speed * dt;

    // Face player horizontally
    z.lookAt(new THREE.Vector3(0, z.position.y, 0));

    // Leg walk animation
    ud.walkT += dt * 5;
    const sw = Math.sin(ud.walkT);
    ud.lLeg.rotation.x =  sw * 0.45;
    ud.rLeg.rotation.x = -sw * 0.45;
    z.position.y = Math.max(0, Math.abs(sw) * 0.04);

    // Hit flash
    if (ud.flashT > 0) {
      ud.flashT -= dt;
      const white = ud.flashT > 0;
      ud.flashParts.forEach((m, k) => {
        m.material.color.setHex(white ? 0xffffff : ud.origColors[k]);
      });
    }

    // HP bar faces camera
    // (removed; using flash instead – keeps it cleaner)

    // Damage player when close
    const dist2D = Math.sqrt(z.position.x ** 2 + z.position.z ** 2);
    if (dist2D < 1.6 && hitCD === 0) {
      takeDamage(9);
      hitCD = 0.5;
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    p.vel.y -= 9.8 * dt;
    p.m.position.addScaledVector(p.vel, dt);
    p.m.scale.setScalar(Math.max(0, p.life * 2.2));
    if (p.life <= 0) {
      scene.remove(p.m);
      p.m.geometry.dispose();
      p.m.material.dispose();
      particles.splice(i, 1);
    }
  }

  renderer.render(scene, camera);
}

// ─── STARTUP ─────────────────────────────────────────────────────────────────
async function startGame() {
  const overlay = document.getElementById('permission-overlay');
  const btn     = document.getElementById('start-btn');
  btn.disabled  = true;
  btn.textContent = 'Starting…';

  try {
    // Camera
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false,
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    await new Promise(res => { video.onloadedmetadata = res; });
    await video.play();

    initAudio();
    await requestOri();
    initScene();
    setupDrag();

    overlay.style.display = 'none';
    G.started = true;
    clock.start();

    // Controls
    const shootBtn  = document.getElementById('shoot-btn');
    const reloadBtn = document.getElementById('reload-btn');

    shootBtn.addEventListener('touchstart',  e => { e.stopPropagation(); shoot();  }, { passive: false });
    shootBtn.addEventListener('click',        e => { e.stopPropagation(); shoot();  });
    reloadBtn.addEventListener('touchstart', e => { e.stopPropagation(); reload(); }, { passive: false });
    reloadBtn.addEventListener('click',       e => { e.stopPropagation(); reload(); });

    document.addEventListener('keydown', e => {
      if (e.code === 'Space') { e.preventDefault(); shoot();  }
      if (e.code === 'KeyR')  { e.preventDefault(); reload(); }
    });

    // Initial wave
    for (let i = 0; i < 3; i++) setTimeout(() => createZombie(), i * 600 + 400);

    loop();

  } catch (err) {
    overlay.innerHTML = `
      <h1 style="font-size:28px;color:#e74c3c;margin-bottom:16px">⚠ Error</h1>
      <p style="color:#bbb;margin-bottom:20px">${err.message || 'Could not start the game'}</p>
      <p style="color:#666;font-size:13px">Please allow camera access and try again.</p>
      <button onclick="location.reload()"
        style="margin-top:24px;padding:14px 40px;font-size:18px;font-weight:900;
               background:linear-gradient(135deg,#e74c3c,#922b21);color:#fff;border:none;
               border-radius:50px;cursor:pointer">RETRY</button>`;
  }
}

// ─── WINDOW RESIZE ────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  if (!camera || !renderer) return;
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ─── WIRE BUTTONS ─────────────────────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', restart);
</script>
