<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GoldenEye FPS</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: monospace; }
#canvas { display: block; width: 100vw; height: 100vh; }

/* HUD */
#hud {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; color: #fff;
}
#crosshair {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 20px; height: 20px;
}
#crosshair::before, #crosshair::after {
  content: ''; position: absolute; background: rgba(255,255,255,0.8);
}
#crosshair::before { width: 2px; height: 20px; left: 9px; top: 0; }
#crosshair::after  { width: 20px; height: 2px; left: 0; top: 9px; }

#health-bar {
  position: absolute; bottom: 20px; left: 20px;
}
#health-label { font-size: 11px; letter-spacing: 2px; color: #aaa; margin-bottom: 4px; }
#health-track { width: 120px; height: 10px; background: #333; border: 1px solid #555; }
#health-fill  { height: 100%; background: #00ff00; transition: width 0.2s, background 0.2s; }

#ammo {
  position: absolute; bottom: 20px; right: 20px; text-align: right;
}
#ammo-count { font-size: 28px; font-weight: bold; letter-spacing: 2px; }
#ammo-label { font-size: 11px; letter-spacing: 2px; color: #aaa; }
#weapon-name { font-size: 12px; letter-spacing: 3px; color: #ffcc00; margin-bottom: 4px; }

#kills {
  position: absolute; top: 20px; left: 20px;
  font-size: 13px; letter-spacing: 2px;
}
#kills span { color: #ffcc00; font-size: 18px; }

#timer {
  position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
  font-size: 16px; letter-spacing: 3px; color: #fff;
}

#hit-indicator {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 18px; color: #ff4444; font-weight: bold;
  opacity: 0; letter-spacing: 3px;
  text-shadow: 0 0 8px #ff0000;
  pointer-events: none;
}

#damage-flash {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(255,0,0,0.4) 100%);
  opacity: 0; pointer-events: none;
}

#minimap {
  position: absolute; top: 20px; right: 20px;
  width: 120px; height: 120px;
  background: rgba(0,0,0,0.6); border: 1px solid #555;
}
#minimap canvas { width: 100%; height: 100%; }

/* Screens */
.screen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(0,0,0,0.85);
  z-index: 100; color: #fff;
}
.screen h1 {
  font-size: clamp(24px, 6vw, 52px);
  letter-spacing: 6px; color: #ffcc00;
  text-shadow: 0 0 20px #ffcc00, 0 0 40px #ff8800;
  margin-bottom: 10px;
}
.screen .subtitle {
  font-size: clamp(10px, 2vw, 14px);
  letter-spacing: 4px; color: #aaa; margin-bottom: 40px;
}
.screen p { font-size: 13px; color: #888; letter-spacing: 2px; margin: 6px 0; }
.btn {
  margin-top: 20px;
  padding: 14px 40px;
  font-size: 16px; letter-spacing: 4px;
  background: #ffcc00; color: #000;
  border: none; cursor: pointer; font-family: monospace;
  text-transform: uppercase;
}
.btn:hover { background: #fff; }

#gameover-screen .result { font-size: 22px; letter-spacing: 4px; color: #ff4444; margin-bottom: 10px; }
#gameover-screen.win .result { color: #00ff00; }

/* Mobile controls */
#mobile-controls {
  position: fixed; bottom: 0; left: 0; width: 100%; height: 200px;
  pointer-events: none; z-index: 50;
  display: none;
}
#joystick-zone {
  position: absolute; bottom: 20px; left: 20px;
  width: 140px; height: 140px;
  pointer-events: all;
}
#joystick-base {
  width: 140px; height: 140px; border-radius: 50%;
  background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.2);
  position: relative;
}
#joystick-thumb {
  width: 60px; height: 60px; border-radius: 50%;
  background: rgba(255,255,255,0.25); border: 2px solid rgba(255,255,255,0.5);
  position: absolute; top: 40px; left: 40px;
  transition: none;
}
#right-zone {
  position: absolute; bottom: 0; right: 0;
  width: calc(100% - 180px); height: 200px;
  pointer-events: all;
}
#shoot-btn {
  position: absolute; bottom: 30px; right: 30px;
  width: 80px; height: 80px; border-radius: 50%;
  background: rgba(255, 50, 50, 0.4); border: 3px solid rgba(255,80,80,0.7);
  color: #fff; font-size: 11px; letter-spacing: 1px;
  font-family: monospace; pointer-events: all;
  display: flex; align-items: center; justify-content: center;
  text-transform: uppercase;
}
#reload-btn {
  position: absolute; bottom: 130px; right: 40px;
  width: 55px; height: 55px; border-radius: 50%;
  background: rgba(255,200,0,0.3); border: 2px solid rgba(255,200,0,0.6);
  color: #ffcc00; font-size: 10px; letter-spacing: 1px;
  font-family: monospace; pointer-events: all;
  display: flex; align-items: center; justify-content: center;
  text-transform: uppercase;
}

@media (pointer: coarse) {
  #mobile-controls { display: block; }
  #crosshair { width: 30px; height: 30px; }
  #crosshair::before { width: 3px; height: 30px; left: 13px; }
  #crosshair::after  { width: 30px; height: 3px; top: 13px; }
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="hud" style="display:none">
  <div id="crosshair"></div>
  <div id="damage-flash"></div>
  <div id="hit-indicator">HIT</div>

  <div id="kills">KILLS <span id="kill-count">0</span></div>
  <div id="timer">00:00</div>

  <div id="minimap"><canvas id="minimap-canvas" width="120" height="120"></canvas></div>

  <div id="health-bar">
    <div id="health-label">HEALTH</div>
    <div id="health-track"><div id="health-fill" style="width:100%"></div></div>
  </div>

  <div id="ammo">
    <div id="weapon-name">PP7</div>
    <div id="ammo-count"><span id="ammo-cur">7</span> / <span id="ammo-res">49</span></div>
    <div id="ammo-label">AMMO</div>
  </div>
</div>

<!-- Start Screen -->
<div id="start-screen" class="screen">
  <h1>GOLDENEYE</h1>
  <div class="subtitle">FIRST PERSON SHOOTER</div>
  <p>ELIMINATE ALL AGENTS</p>
  <p style="margin-top:8px; font-size:11px; color:#666">DESKTOP: WASD + MOUSE &nbsp;|&nbsp; MOBILE: JOYSTICK + SWIPE</p>
  <button class="btn" id="start-btn">START MISSION</button>
</div>

<!-- Game Over Screen -->
<div id="gameover-screen" class="screen" style="display:none">
  <div class="result" id="result-text">MISSION FAILED</div>
  <h1 id="gameover-title">YOU DIED</h1>
  <div class="subtitle" id="gameover-sub">BETTER LUCK NEXT TIME</div>
  <p id="final-kills">KILLS: 0</p>
  <p id="final-time">TIME: 00:00</p>
  <button class="btn" id="restart-btn">RETRY MISSION</button>
</div>

<!-- Mobile Controls -->
<div id="mobile-controls">
  <div id="joystick-zone">
    <div id="joystick-base">
      <div id="joystick-thumb"></div>
    </div>
  </div>
  <div id="right-zone"></div>
  <button id="shoot-btn">FIRE</button>
  <button id="reload-btn">RELOAD</button>
</div>

<script type="module">
import * as THREE from 'three';

// ─── Constants ────────────────────────────────────────────────────────────────
const PLAYER_SPEED   = 5;
const PLAYER_HEIGHT  = 1.7;
const BOT_SPEED      = 2.2;
const BOT_COUNT      = 6;
const GRAVITY        = 20;
const SHOOT_RANGE    = 60;
const MAP_SIZE       = 40;
const WALL_H         = 3.2;

const WEAPONS = {
  PP7:    { ammo: 7,  reserve: 49, damage: 25, rof: 400, spread: 0.03, auto: false, name: 'PP7' },
  AK47:   { ammo: 30, reserve: 90, damage: 18, rof: 120, spread: 0.05, auto: true,  name: 'AK-47' },
  SHOTGUN:{ ammo: 2,  reserve: 16, damage: 60, rof: 800, spread: 0.18, auto: false, name: 'SHOTGUN' },
};

// ─── Scene setup ──────────────────────────────────────────────────────────────
const canvas   = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0x1a1a2e);

const scene  = new THREE.Scene();
scene.fog    = new THREE.Fog(0x1a1a2e, 15, 50);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.05, 80);
camera.position.set(0, PLAYER_HEIGHT, 0);

// ─── Lighting ─────────────────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0x334466, 0.8);
scene.add(ambient);

function addLight(x, z, color = 0xffeedd) {
  const light = new THREE.PointLight(color, 1.5, 12);
  light.position.set(x, WALL_H - 0.5, z);
  light.castShadow = true;
  light.shadow.mapSize.set(256, 256);
  scene.add(light);
}
// Lights across the map
[[-8,-8],[8,-8],[-8,8],[8,8],[0,0],[-16,0],[16,0],[0,-16],[0,16]].forEach(([x,z]) => addLight(x,z));

// ─── Map building ─────────────────────────────────────────────────────────────
const matFloor  = new THREE.MeshLambertMaterial({ color: 0x3a3a4a });
const matCeil   = new THREE.MeshLambertMaterial({ color: 0x222233 });
const matWall   = new THREE.MeshLambertMaterial({ color: 0x4a4a5a });
const matWall2  = new THREE.MeshLambertMaterial({ color: 0x3d3d4d });
const matCrate  = new THREE.MeshLambertMaterial({ color: 0x5c4a2a });

// Floor
const floor = new THREE.Mesh(new THREE.PlaneGeometry(MAP_SIZE*2, MAP_SIZE*2), matFloor);
floor.rotation.x = -Math.PI/2; floor.receiveShadow = true;
scene.add(floor);

// Ceiling
const ceil = new THREE.Mesh(new THREE.PlaneGeometry(MAP_SIZE*2, MAP_SIZE*2), matCeil);
ceil.rotation.x = Math.PI/2; ceil.position.y = WALL_H; ceil.receiveShadow = true;
scene.add(ceil);

// Wall helpers
const wallBoxes = []; // for collision

function makeWall(x, z, w, d, mat = matWall) {
  const geo  = new THREE.BoxGeometry(w, WALL_H, d);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, WALL_H/2, z);
  mesh.castShadow = mesh.receiveShadow = true;
  scene.add(mesh);
  wallBoxes.push(new THREE.Box3().setFromObject(mesh));
  return mesh;
}

// Outer boundary walls
const S = MAP_SIZE;
makeWall( 0, -S, S*2, 1); makeWall( 0,  S, S*2, 1);
makeWall(-S,  0, 1, S*2); makeWall( S,  0, 1, S*2);

// Interior walls — GoldenEye facility feel
makeWall(-15,  0, 1, 14); makeWall( 15,  0, 1, 14);
makeWall(-15, -7, 1,  6); makeWall( 15, -7, 1,  6);
makeWall(  0, 10, 12, 1); makeWall(  0,-10, 12, 1);
makeWall( -8, 18, 1, 10); makeWall(  8, 18, 1, 10);
makeWall( -8,-18, 1, 10); makeWall(  8,-18, 1, 10);
makeWall(-20, 20, 10, 1); makeWall( 20, 20, 10, 1);
makeWall(-20,-20, 10, 1); makeWall( 20,-20, 10, 1);
makeWall(-25,  8, 1,  8, matWall2); makeWall( 25,  8, 1,  8, matWall2);
makeWall(-25, -8, 1,  8, matWall2); makeWall( 25, -8, 1,  8, matWall2);
makeWall(  0, 28, 16, 1); makeWall(  0,-28, 16, 1);
makeWall( -5, 22,  1,  8); makeWall(  5, 22,  1,  8);
makeWall( -5,-22,  1,  8); makeWall(  5,-22,  1,  8);

// Crates for cover
function makeCrate(x, z, size=1.2) {
  const geo  = new THREE.BoxGeometry(size, size, size);
  const mesh = new THREE.Mesh(geo, matCrate);
  mesh.position.set(x, size/2, z);
  mesh.castShadow = mesh.receiveShadow = true;
  scene.add(mesh);
  wallBoxes.push(new THREE.Box3().setFromObject(mesh));
}
[[-6,4],[6,4],[-6,-4],[6,-4],[12,14],[-12,14],[12,-14],[-12,-14],
 [20,0],[-20,0],[0,20],[0,-20],[18,18],[-18,18],[18,-18],[-18,-18]
].forEach(([x,z]) => makeCrate(x,z));

// ─── Weapon model (hand + gun) ─────────────────────────────────────────────
const weaponGroup = new THREE.Group();
camera.add(weaponGroup);
scene.add(camera);

function buildGunMesh(type) {
  const g = new THREE.Group();
  const matGun   = new THREE.MeshLambertMaterial({ color: 0x222222 });
  const matGrip  = new THREE.MeshLambertMaterial({ color: 0x111111 });
  const matHand  = new THREE.MeshLambertMaterial({ color: 0xc68642 });

  // Hand
  const hand = new THREE.Mesh(new THREE.BoxGeometry(0.12,0.14,0.22), matHand);
  hand.position.set(0.07,-0.12,-0.25); g.add(hand);

  if (type === 'PP7') {
    const body    = new THREE.Mesh(new THREE.BoxGeometry(0.06,0.1,0.2), matGun);
    body.position.set(0.04,-0.06,-0.25); g.add(body);
    const barrel  = new THREE.Mesh(new THREE.BoxGeometry(0.04,0.04,0.18), matGun);
    barrel.position.set(0.04,-0.04,-0.38); g.add(barrel);
    const grip    = new THREE.Mesh(new THREE.BoxGeometry(0.06,0.12,0.08), matGrip);
    grip.position.set(0.04,-0.14,-0.22); g.add(grip);
  } else if (type === 'AK47') {
    const body    = new THREE.Mesh(new THREE.BoxGeometry(0.07,0.08,0.38), matGun);
    body.position.set(0.04,-0.05,-0.32); g.add(body);
    const barrel  = new THREE.Mesh(new THREE.BoxGeometry(0.03,0.03,0.26), matGun);
    barrel.position.set(0.04,-0.04,-0.54); g.add(barrel);
    const grip    = new THREE.Mesh(new THREE.BoxGeometry(0.06,0.14,0.07), matGrip);
    grip.position.set(0.04,-0.14,-0.26); g.add(grip);
    const mag     = new THREE.Mesh(new THREE.BoxGeometry(0.05,0.13,0.06), matGrip);
    mag.position.set(0.04,-0.17,-0.32); mag.rotation.x = 0.3; g.add(mag);
  } else {
    const body    = new THREE.Mesh(new THREE.BoxGeometry(0.1,0.1,0.34), matGun);
    body.position.set(0.04,-0.05,-0.28); g.add(body);
    const barrel  = new THREE.Mesh(new THREE.BoxGeometry(0.12,0.08,0.1), matGun);
    barrel.position.set(0.04,-0.05,-0.45); g.add(barrel);
    const grip    = new THREE.Mesh(new THREE.BoxGeometry(0.07,0.13,0.08), matGrip);
    grip.position.set(0.04,-0.15,-0.24); g.add(grip);
  }
  return g;
}

let currentWeaponMesh = null;
let currentWeaponKey  = 'PP7';

function equipWeapon(key) {
  if (currentWeaponMesh) weaponGroup.remove(currentWeaponMesh);
  currentWeaponKey  = key;
  currentWeaponMesh = buildGunMesh(key);
  weaponGroup.add(currentWeaponMesh);
  const w = WEAPONS[key];
  playerAmmo    = w.ammo;
  playerReserve = w.reserve;
  updateAmmoHUD();
  document.getElementById('weapon-name').textContent = w.name;
}

// ─── Player state ──────────────────────────────────────────────────────────
let playerHealth = 100;
let playerAmmo   = 7;
let playerReserve= 49;
let kills        = 0;
let gameRunning  = false;
let gameClock    = 0;
let lastShot     = 0;
let reloading    = false;
let reloadTimer  = 0;
let isAuto       = false;
let shootHeld    = false;

const velocity  = new THREE.Vector3();
const playerBox = new THREE.Box3();

// ─── Bots ─────────────────────────────────────────────────────────────────
const botMat    = new THREE.MeshLambertMaterial({ color: 0x334466 });
const botMatB   = new THREE.MeshLambertMaterial({ color: 0x223355 });
const botMatH   = new THREE.MeshLambertMaterial({ color: 0xd4a76a });
const botMatG   = new THREE.MeshLambertMaterial({ color: 0x222222 });

function makeBotMesh() {
  const g = new THREE.Group();
  // Body
  const torso = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.7,0.3), botMat);
  torso.position.y = 0; g.add(torso);
  // Head
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.32,0.32,0.32), botMatH);
  head.position.y = 0.52; g.add(head);
  // Legs
  const legL = new THREE.Mesh(new THREE.BoxGeometry(0.2,0.6,0.22), botMatB);
  legL.position.set(-0.15,-0.65,0); g.add(legL);
  const legR = new THREE.Mesh(new THREE.BoxGeometry(0.2,0.6,0.22), botMatB);
  legR.position.set( 0.15,-0.65,0); g.add(legR);
  // Arms
  const armL = new THREE.Mesh(new THREE.BoxGeometry(0.18,0.55,0.2), botMat);
  armL.position.set(-0.34,-0.05,0); g.add(armL);
  const armR = new THREE.Mesh(new THREE.BoxGeometry(0.18,0.55,0.2), botMat);
  armR.position.set( 0.34,-0.05,0); g.add(armR);
  // Gun
  const gun = new THREE.Mesh(new THREE.BoxGeometry(0.05,0.05,0.28), botMatG);
  gun.position.set(0.34,-0.08,-0.24); g.add(gun);
  g.castShadow = true;
  return g;
}

const BOT_SPAWN_POINTS = [
  [-10,-10],[ 10,-10],[-10,10],[10,10],
  [-22, 0],[22,0],[0,-22],[0,22],
  [-18,-18],[18,-18],[-18,18],[18,18],
];

class Bot {
  constructor(id) {
    this.id      = id;
    this.health  = 100;
    this.alive   = true;
    this.mesh    = makeBotMesh();
    this.state   = 'patrol'; // patrol | chase | shoot | cover
    this.shootCD = 0;
    this.patrolTarget = new THREE.Vector3();
    this.coverTimer  = 0;
    this.vel         = new THREE.Vector3();
    this.legPhase    = Math.random() * Math.PI * 2;
    this.respawnTimer = 0;
    this.spawn();
    scene.add(this.mesh);
  }

  spawn() {
    const pt = BOT_SPAWN_POINTS[this.id % BOT_SPAWN_POINTS.length];
    this.mesh.position.set(pt[0], 1.0, pt[1]);
    this.health = 100;
    this.alive  = true;
    this.mesh.visible = true;
    this.setNewPatrolTarget();
  }

  setNewPatrolTarget() {
    this.patrolTarget.set(
      (Math.random()-0.5)*(MAP_SIZE*1.6),
      0,
      (Math.random()-0.5)*(MAP_SIZE*1.6)
    );
  }

  update(dt, playerPos) {
    if (!this.alive) {
      this.respawnTimer -= dt;
      if (this.respawnTimer <= 0) this.spawn();
      return;
    }

    const toPlayer = new THREE.Vector3().subVectors(playerPos, this.mesh.position);
    toPlayer.y = 0;
    const dist = toPlayer.length();

    // State machine
    if (dist < 3)        this.state = 'shoot';
    else if (dist < 18)  this.state = 'chase';
    else                 this.state = 'patrol';

    if (this.coverTimer > 0) { this.state = 'cover'; this.coverTimer -= dt; }

    const pos = this.mesh.position;
    let moved = false;

    if (this.state === 'patrol') {
      const toPat = new THREE.Vector3().subVectors(this.patrolTarget, pos);
      toPat.y = 0;
      if (toPat.length() < 2) this.setNewPatrolTarget();
      else {
        toPat.normalize().multiplyScalar(BOT_SPEED * 0.5 * dt);
        pos.add(toPat); moved = true;
        this.mesh.lookAt(this.patrolTarget.x, pos.y, this.patrolTarget.z);
      }
    } else if (this.state === 'chase') {
      const dir = toPlayer.clone().normalize().multiplyScalar(BOT_SPEED * dt);
      pos.add(dir); moved = true;
      this.mesh.lookAt(playerPos.x, pos.y, playerPos.z);
    } else if (this.state === 'shoot') {
      this.mesh.lookAt(playerPos.x, pos.y, playerPos.z);
      this.shootCD -= dt;
      if (this.shootCD <= 0) {
        this.shootCD = 1.2 + Math.random();
        this.shootAtPlayer(playerPos);
      }
    } else if (this.state === 'cover') {
      // strafe sideways
      const side = new THREE.Vector3(-toPlayer.z, 0, toPlayer.x).normalize().multiplyScalar(BOT_SPEED * dt);
      pos.add(side); moved = true;
      this.mesh.lookAt(playerPos.x, pos.y, playerPos.z);
    }

    // Keep above floor
    pos.y = 1.0;

    // Animate legs
    if (moved) {
      this.legPhase += dt * 8;
      const legs = [this.mesh.children[2], this.mesh.children[3]];
      if (legs[0]) legs[0].position.y = -0.65 + Math.sin(this.legPhase) * 0.1;
      if (legs[1]) legs[1].position.y = -0.65 - Math.sin(this.legPhase) * 0.1;
    }

    // Clamp inside map
    pos.x = THREE.MathUtils.clamp(pos.x, -(MAP_SIZE-1), MAP_SIZE-1);
    pos.z = THREE.MathUtils.clamp(pos.z, -(MAP_SIZE-1), MAP_SIZE-1);
  }

  shootAtPlayer(playerPos) {
    if (!gameRunning) return;
    // Accuracy based on difficulty
    const spread = 0.3;
    const hit    = Math.random() > 0.45; // 55% hit rate
    if (hit) {
      takeDamage(12 + Math.random()*8);
    }
    // Muzzle flash effect on bot
    flashBotGun(this);
    // Cover after shooting
    if (Math.random() > 0.6) this.coverTimer = 0.6 + Math.random();
  }

  takeDamage(dmg) {
    this.health -= dmg;
    if (this.health <= 0) {
      this.die();
    } else {
      // Stagger — enter cover
      this.coverTimer = 0.4;
    }
  }

  die() {
    this.alive  = false;
    this.mesh.visible = false;
    this.respawnTimer = 8 + Math.random()*4;
    kills++;
    document.getElementById('kill-count').textContent = kills;
    showHit();
    // Drop weapon pickup sometimes
    if (Math.random() > 0.6) spawnPickup(this.mesh.position.clone());
    checkWin();
  }
}

// ─── Muzzle flash ─────────────────────────────────────────────────────────
const flashLight = new THREE.PointLight(0xffaa00, 0, 4);
scene.add(flashLight);
flashLight.position.copy(camera.position);
let flashTimer = 0;

function triggerFlash(pos) {
  flashLight.position.copy(pos);
  flashLight.intensity = 3;
  flashTimer = 0.06;
}

function flashBotGun(bot) {
  // visual only — bot shoots from position
}

// ─── Pickups ──────────────────────────────────────────────────────────────
const pickups = [];
const pickupMats = {
  health: new THREE.MeshLambertMaterial({ color: 0x00ff44 }),
  ammo:   new THREE.MeshLambertMaterial({ color: 0xffcc00 }),
  weapon: new THREE.MeshLambertMaterial({ color: 0xff4400 }),
};

function spawnPickup(pos) {
  const types = ['health','ammo','ammo','weapon'];
  const type  = types[Math.floor(Math.random()*types.length)];
  const geo   = new THREE.BoxGeometry(0.4,0.4,0.4);
  const mesh  = new THREE.Mesh(geo, pickupMats[type]);
  mesh.position.copy(pos);
  mesh.position.y = 0.3;
  mesh.userData.type = type;
  mesh.userData.age  = 0;
  scene.add(mesh);
  pickups.push(mesh);
}

function updatePickups(dt) {
  for (let i = pickups.length-1; i >= 0; i--) {
    const p = pickups[i];
    p.userData.age += dt;
    p.rotation.y += dt * 2;
    p.position.y  = 0.3 + Math.sin(p.userData.age*3)*0.1;
    if (p.userData.age > 15) { scene.remove(p); pickups.splice(i,1); continue; }
    const d = camera.position.distanceTo(p.position);
    if (d < 1.2) {
      collectPickup(p.userData.type);
      scene.remove(p); pickups.splice(i,1);
    }
  }
}

function collectPickup(type) {
  if (type === 'health') {
    playerHealth = Math.min(100, playerHealth + 30);
    updateHealthHUD();
  } else if (type === 'ammo') {
    playerReserve += WEAPONS[currentWeaponKey].ammo * 2;
    updateAmmoHUD();
  } else if (type === 'weapon') {
    const keys = Object.keys(WEAPONS);
    const next  = keys[(keys.indexOf(currentWeaponKey)+1) % keys.length];
    equipWeapon(next);
  }
}

// ─── Raycaster / shooting ─────────────────────────────────────────────────
const raycaster    = new THREE.Raycaster();
const botMeshes    = [];
let bots           = [];

function shoot() {
  if (!gameRunning || reloading) return;
  const w = WEAPONS[currentWeaponKey];
  if (playerAmmo <= 0) { reload(); return; }
  const now = performance.now();
  if (now - lastShot < w.rof) return;
  lastShot = now;

  playerAmmo--;
  updateAmmoHUD();

  // Spread
  const spread = w.spread;
  const dir = new THREE.Vector3(
    (Math.random()-0.5)*spread,
    (Math.random()-0.5)*spread,
    -1
  ).normalize().transformDirection(camera.matrixWorld).normalize();

  raycaster.set(camera.position, dir);

  // Check bot hits
  const allMeshes = bots.flatMap(b => b.alive ? b.mesh.children.map(c => c) : []);
  const hits = raycaster.intersectObjects(allMeshes, false);
  if (hits.length > 0 && hits[0].distance < SHOOT_RANGE) {
    // Find which bot
    for (const bot of bots) {
      if (!bot.alive) continue;
      if (bot.mesh.children.includes(hits[0].object)) {
        bot.takeDamage(w.damage + (Math.random()-0.5)*10);
        showHit();
        break;
      }
    }
  }

  // Gun kick animation
  gunKick();
  // Muzzle flash
  const flashPos = new THREE.Vector3(0,0,-0.5).applyMatrix4(camera.matrixWorld);
  triggerFlash(flashPos);

  if (playerAmmo <= 0 && playerReserve > 0) reload();
}

function reload() {
  if (reloading || playerReserve <= 0) return;
  reloading = true;
  reloadTimer = 1.5;
  document.getElementById('ammo-cur').textContent = '...';
}

function finishReload() {
  const w = WEAPONS[currentWeaponKey];
  const need = w.ammo - playerAmmo;
  const take = Math.min(need, playerReserve);
  playerAmmo   += take;
  playerReserve -= take;
  reloading = false;
  updateAmmoHUD();
}

// ─── Gun animations ────────────────────────────────────────────────────────
let kickTime = 0;
const REST_POS = new THREE.Vector3(0, 0, 0);

function gunKick() { kickTime = 0.08; }

function updateGunAnim(dt) {
  if (kickTime > 0) {
    kickTime -= dt;
    weaponGroup.position.z = 0.04;
    weaponGroup.rotation.x = -0.12;
  } else {
    weaponGroup.position.z += (0 - weaponGroup.position.z) * 0.25;
    weaponGroup.rotation.x += (0 - weaponGroup.rotation.x) * 0.25;
  }
  // Sway
  weaponGroup.position.x = 0.12 + Math.sin(Date.now()*0.001)*0.004;
  weaponGroup.position.y = -0.15 + Math.sin(Date.now()*0.0015)*0.003;
}

// ─── HUD ──────────────────────────────────────────────────────────────────
function updateHealthHUD() {
  const pct = Math.max(0, playerHealth);
  document.getElementById('health-fill').style.width = pct + '%';
  document.getElementById('health-fill').style.background =
    pct > 60 ? '#00ff00' : pct > 30 ? '#ffcc00' : '#ff3300';
}

function updateAmmoHUD() {
  document.getElementById('ammo-cur').textContent = playerAmmo;
  document.getElementById('ammo-res').textContent = playerReserve;
}

let hitFadeTimer = 0;
function showHit() {
  const el = document.getElementById('hit-indicator');
  el.style.opacity = '1';
  hitFadeTimer = 0.4;
}

function flashDamage() {
  const el = document.getElementById('damage-flash');
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.4s'; }, 50);
}

function takeDamage(dmg) {
  playerHealth -= dmg;
  updateHealthHUD();
  flashDamage();
  if (playerHealth <= 0) gameOver(false);
}

// ─── Timer ────────────────────────────────────────────────────────────────
function formatTime(s) {
  const m = Math.floor(s/60).toString().padStart(2,'0');
  const sec = Math.floor(s%60).toString().padStart(2,'0');
  return `${m}:${sec}`;
}

// ─── Minimap ──────────────────────────────────────────────────────────────
const mmCanvas = document.getElementById('minimap-canvas');
const mmCtx    = mmCanvas.getContext('2d');
const MM_SCALE = 120 / (MAP_SIZE*2);

function drawMinimap() {
  mmCtx.clearRect(0,0,120,120);
  mmCtx.fillStyle = 'rgba(0,0,0,0.5)';
  mmCtx.fillRect(0,0,120,120);

  // Walls
  mmCtx.fillStyle = '#556';
  for (const box of wallBoxes) {
    const cx = (box.min.x + box.max.x)/2;
    const cz = (box.min.z + box.max.z)/2;
    const w  = box.max.x - box.min.x;
    const d  = box.max.z - box.min.z;
    mmCtx.fillRect(
      (cx - w/2 + MAP_SIZE)*MM_SCALE,
      (cz - d/2 + MAP_SIZE)*MM_SCALE,
      w*MM_SCALE, d*MM_SCALE
    );
  }

  // Bots
  for (const bot of bots) {
    if (!bot.alive) continue;
    mmCtx.fillStyle = '#f44';
    mmCtx.beginPath();
    mmCtx.arc(
      (bot.mesh.position.x + MAP_SIZE)*MM_SCALE,
      (bot.mesh.position.z + MAP_SIZE)*MM_SCALE,
      3, 0, Math.PI*2
    );
    mmCtx.fill();
  }

  // Player
  const px = (camera.position.x + MAP_SIZE)*MM_SCALE;
  const pz = (camera.position.z + MAP_SIZE)*MM_SCALE;
  mmCtx.fillStyle = '#0f0';
  mmCtx.beginPath();
  mmCtx.arc(px, pz, 4, 0, Math.PI*2);
  mmCtx.fill();
  // Direction
  const fwd = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
  mmCtx.strokeStyle = '#0f0';
  mmCtx.lineWidth = 1.5;
  mmCtx.beginPath();
  mmCtx.moveTo(px, pz);
  mmCtx.lineTo(px + fwd.x*10, pz + fwd.z*10);
  mmCtx.stroke();
}

// ─── Input ────────────────────────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'KeyR') reload();
  if (e.code === 'Digit1') equipWeapon('PP7');
  if (e.code === 'Digit2') equipWeapon('AK47');
  if (e.code === 'Digit3') equipWeapon('SHOTGUN');
});
document.addEventListener('keyup',  e => { keys[e.code] = false; });

// Mouse look
let yaw = 0, pitch = 0;
document.addEventListener('mousemove', e => {
  if (!gameRunning) return;
  yaw   -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch  = THREE.MathUtils.clamp(pitch, -1.2, 1.2);
  camera.rotation.order = 'YXZ';
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;
});

canvas.addEventListener('click', () => {
  if (gameRunning) canvas.requestPointerLock();
});

document.addEventListener('mousedown', e => {
  if (e.button === 0 && gameRunning) { shootHeld = true; }
});
document.addEventListener('mouseup',   e => { if (e.button === 0) shootHeld = false; });

// ─── Mobile joystick ──────────────────────────────────────────────────────
let joystickActive = false;
let joystickOrigin = { x: 0, y: 0 };
let joystickDelta  = { x: 0, y: 0 };
const THUMB_MAX    = 40;

const jBase  = document.getElementById('joystick-base');
const jThumb = document.getElementById('joystick-thumb');

function getJoyPos(e) {
  const t = e.changedTouches ? e.changedTouches[0] : e;
  return { x: t.clientX, y: t.clientY };
}

jBase.addEventListener('touchstart', e => {
  e.preventDefault();
  const p = getJoyPos(e);
  joystickActive = true;
  joystickOrigin = p;
  joystickDelta  = { x: 0, y: 0 };
}, { passive: false });

jBase.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!joystickActive) return;
  const p  = getJoyPos(e);
  const dx = p.x - joystickOrigin.x;
  const dy = p.y - joystickOrigin.y;
  const d  = Math.min(Math.sqrt(dx*dx+dy*dy), THUMB_MAX);
  const angle = Math.atan2(dy, dx);
  joystickDelta.x = Math.cos(angle) * d / THUMB_MAX;
  joystickDelta.y = Math.sin(angle) * d / THUMB_MAX;
  jThumb.style.left = (40 + Math.cos(angle)*d) + 'px';
  jThumb.style.top  = (40 + Math.sin(angle)*d) + 'px';
}, { passive: false });

function resetJoystick() {
  joystickActive = false;
  joystickDelta  = { x: 0, y: 0 };
  jThumb.style.left = '40px';
  jThumb.style.top  = '40px';
}
jBase.addEventListener('touchend',    resetJoystick);
jBase.addEventListener('touchcancel', resetJoystick);

// Right zone — look / aim swipe
const rightZone = document.getElementById('right-zone');
let lookTouches = {};

rightZone.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    lookTouches[t.identifier] = { x: t.clientX, y: t.clientY };
  }
}, { passive: false });

rightZone.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!gameRunning) return;
  for (const t of e.changedTouches) {
    const prev = lookTouches[t.identifier];
    if (!prev) continue;
    const dx = t.clientX - prev.x;
    const dy = t.clientY - prev.y;
    yaw   -= dx * 0.005;
    pitch -= dy * 0.005;
    pitch  = THREE.MathUtils.clamp(pitch, -1.2, 1.2);
    camera.rotation.order = 'YXZ';
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;
    lookTouches[t.identifier] = { x: t.clientX, y: t.clientY };
  }
}, { passive: false });

rightZone.addEventListener('touchend', e => {
  for (const t of e.changedTouches) delete lookTouches[t.identifier];
});
rightZone.addEventListener('touchcancel', e => {
  for (const t of e.changedTouches) delete lookTouches[t.identifier];
});

// Shoot & reload buttons
document.getElementById('shoot-btn').addEventListener('touchstart', e => {
  e.preventDefault(); shootHeld = true;
}, { passive: false });
document.getElementById('shoot-btn').addEventListener('touchend', e => {
  e.preventDefault(); shootHeld = false;
}, { passive: false });
document.getElementById('reload-btn').addEventListener('touchstart', e => {
  e.preventDefault(); reload();
}, { passive: false });

// ─── Collision ────────────────────────────────────────────────────────────
const PLAYER_RADIUS = 0.4;

function resolveCollisions(nextPos) {
  playerBox.setFromCenterAndSize(
    nextPos.clone().add(new THREE.Vector3(0, PLAYER_HEIGHT/2, 0)),
    new THREE.Vector3(PLAYER_RADIUS*2, PLAYER_HEIGHT, PLAYER_RADIUS*2)
  );
  for (const wall of wallBoxes) {
    if (!playerBox.intersectsBox(wall)) continue;
    // Push out
    const wc = new THREE.Vector3();
    const pc = new THREE.Vector3();
    wall.getCenter(wc); playerBox.getCenter(pc);
    const diff = new THREE.Vector3().subVectors(pc, wc);
    diff.y = 0;
    const wSize = new THREE.Vector3(); wall.getSize(wSize);
    const overlapX = (PLAYER_RADIUS + wSize.x/2) - Math.abs(diff.x);
    const overlapZ = (PLAYER_RADIUS + wSize.z/2) - Math.abs(diff.z);
    if (overlapX < overlapZ) {
      nextPos.x += Math.sign(diff.x) * overlapX;
    } else {
      nextPos.z += Math.sign(diff.z) * overlapZ;
    }
  }
  nextPos.x = THREE.MathUtils.clamp(nextPos.x, -(MAP_SIZE-0.5), MAP_SIZE-0.5);
  nextPos.z = THREE.MathUtils.clamp(nextPos.z, -(MAP_SIZE-0.5), MAP_SIZE-0.5);
  return nextPos;
}

// ─── Win / Lose ──────────────────────────────────────────────────────────
const TARGET_KILLS = BOT_COUNT * 3; // Kill each bot 3 times

function checkWin() {
  if (kills >= TARGET_KILLS) gameOver(true);
}

function gameOver(win) {
  gameRunning = false;
  document.exitPointerLock();
  document.getElementById('hud').style.display = 'none';
  const screen = document.getElementById('gameover-screen');
  screen.style.display = 'flex';
  if (win) {
    screen.classList.add('win');
    document.getElementById('result-text').textContent  = 'MISSION COMPLETE';
    document.getElementById('gameover-title').textContent = 'AGENT WIN';
    document.getElementById('gameover-sub').textContent   = 'ALL TARGETS ELIMINATED';
  } else {
    screen.classList.remove('win');
    document.getElementById('result-text').textContent  = 'MISSION FAILED';
    document.getElementById('gameover-title').textContent = 'YOU DIED';
    document.getElementById('gameover-sub').textContent   = 'BETTER LUCK NEXT TIME';
  }
  document.getElementById('final-kills').textContent = `KILLS: ${kills} / ${TARGET_KILLS}`;
  document.getElementById('final-time').textContent  = `TIME: ${formatTime(gameClock)}`;
}

// ─── Start / Restart ──────────────────────────────────────────────────────
function startGame() {
  // Reset player
  playerHealth = 100;
  kills        = 0;
  gameClock    = 0;
  reloading    = false;
  camera.position.set(0, PLAYER_HEIGHT, 0);
  yaw = 0; pitch = 0;
  camera.rotation.set(0,0,0);
  updateHealthHUD();

  // Clear old bots
  bots.forEach(b => scene.remove(b.mesh));
  bots = Array.from({ length: BOT_COUNT }, (_,i) => new Bot(i));
  document.getElementById('kill-count').textContent = '0';

  // Spawn some pickups
  pickups.forEach(p => scene.remove(p));
  pickups.length = 0;

  equipWeapon('PP7');

  document.getElementById('start-screen').style.display  = 'none';
  document.getElementById('gameover-screen').style.display = 'none';
  document.getElementById('hud').style.display = 'block';
  gameRunning = true;
  canvas.requestPointerLock();
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

// ─── Main loop ────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  if (gameRunning) {
    gameClock += dt;
    document.getElementById('timer').textContent = formatTime(gameClock);

    // Auto-shoot
    const w = WEAPONS[currentWeaponKey];
    if (shootHeld && (w.auto || !w.auto)) shoot();

    // Reload timer
    if (reloading) {
      reloadTimer -= dt;
      if (reloadTimer <= 0) finishReload();
    }

    // Hit indicator fade
    if (hitFadeTimer > 0) {
      hitFadeTimer -= dt;
      if (hitFadeTimer <= 0) document.getElementById('hit-indicator').style.opacity = '0';
    }

    // Flash
    if (flashTimer > 0) {
      flashTimer -= dt;
      if (flashTimer <= 0) flashLight.intensity = 0;
    }

    // Player movement
    const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
    const right   = new THREE.Vector3( Math.cos(yaw), 0, -Math.sin(yaw));
    const moveDir = new THREE.Vector3();

    if (keys['KeyW'] || keys['ArrowUp'])    moveDir.addScaledVector(forward, 1);
    if (keys['KeyS'] || keys['ArrowDown'])  moveDir.addScaledVector(forward,-1);
    if (keys['KeyA'] || keys['ArrowLeft'])  moveDir.addScaledVector(right,  -1);
    if (keys['KeyD'] || keys['ArrowRight']) moveDir.addScaledVector(right,   1);

    // Joystick
    if (joystickActive) {
      moveDir.addScaledVector(forward, -joystickDelta.y);
      moveDir.addScaledVector(right,    joystickDelta.x);
    }

    if (moveDir.length() > 0) moveDir.normalize();

    const nextPos = camera.position.clone();
    nextPos.x += moveDir.x * PLAYER_SPEED * dt;
    nextPos.z += moveDir.z * PLAYER_SPEED * dt;
    nextPos.y  = PLAYER_HEIGHT;

    camera.position.copy(resolveCollisions(nextPos));

    // Update bots
    for (const bot of bots) bot.update(dt, camera.position);

    // Pickups
    updatePickups(dt);

    // Gun anim
    updateGunAnim(dt);

    // Minimap
    drawMinimap();

    // Flash light follows camera
    flashLight.position.copy(camera.position).add(new THREE.Vector3(0,0,-0.5).applyQuaternion(camera.quaternion));
  }

  renderer.render(scene, camera);
}

// ─── Resize ───────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
